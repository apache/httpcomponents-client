name: Java CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # windows-latest is not used due to intermittent network failures
        os: [ubuntu-latest, macos-latest]
        # All LTS versions plus the current version
        java: [ 11, 17, 21 ]
        include:
          - java: 8
            os: ubuntu-latest
      fail-fast: false
        
    steps:
    - uses: actions/checkout@v5
    - uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Select JDK toolchain version
      run: |
        case '${{ matrix.java }}' in
          8)
            echo 'HC_BUILD_TOOLCHAIN_VERSION=1.8' >> "$GITHUB_ENV"
            ;;
          *)
            echo 'HC_BUILD_TOOLCHAIN_VERSION=${{ matrix.java }}' >> "$GITHUB_ENV"
            ;;
        esac
    - name: Set up toolchain JDK ${{ matrix.java }}
      id: setup-java-toolchain
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Set up JDK 17 for Maven
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Configure Maven toolchains
      env:
        TOOLCHAIN_JAVA_HOME: ${{ steps.setup-java-toolchain.outputs.path }}
      run: |
        mkdir -p "${HOME}/.m2"
        cat > "${HOME}/.m2/toolchains.xml" <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <toolchains>
          <toolchain>
            <type>jdk</type>
            <provides>
              <version>${HC_BUILD_TOOLCHAIN_VERSION}</version>
            </provides>
            <configuration>
              <jdkHome>${TOOLCHAIN_JAVA_HOME}</jdkHome>
            </configuration>
          </toolchain>
        </toolchains>
        EOF
    - name: Build with Maven
      run: ./mvnw -V --file pom.xml --no-transfer-progress -DtrimStackTrace=false -Djunit.jupiter.execution.parallel.enabled=false -Dhc.build.toolchain.version="${HC_BUILD_TOOLCHAIN_VERSION}" -Pdocker

  # Windows Named Pipe tests — requires Windows for \\.\pipe\... support
  windows-npipe:

    runs-on: windows-latest
    strategy:
      matrix:
        java: [ 17, 21 ]
      fail-fast: false

    steps:
    - uses: actions/checkout@v5
    - uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Build all modules (compile only)
      run: ./mvnw.cmd -V --file pom.xml --no-transfer-progress -P-use-toolchains install -DskipTests
    - name: Run Named Pipe unit tests
      timeout-minutes: 10
      run: ./mvnw.cmd -V --file pom.xml --no-transfer-progress -P-use-toolchains -pl httpclient5-testing "-DtrimStackTrace=false" "-Djunit.jupiter.execution.parallel.enabled=false" "-Dtest=NpipeIntegrationTests" test
    - name: Run Named Pipe Docker integration tests
      timeout-minutes: 10
      run: ./mvnw.cmd -V --file pom.xml --no-transfer-progress -P-use-toolchains -pl httpclient5-testing "-DtrimStackTrace=false" "-Djunit.jupiter.execution.parallel.enabled=false" "-Dtest=WindowsNamedPipeDockerIT" -Pdocker verify
